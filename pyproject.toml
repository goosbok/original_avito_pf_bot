[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
asyncio_default_test_loop_scope = "module"
filterwarnings = [
    "ignore::DeprecationWarning:aiogram.*",
]
addopts = "-ra -q"

[tool.pytest.ini_options.markers]
slow = "marks tests as slow"
