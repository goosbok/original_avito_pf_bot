<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Avito PF Bot — вход</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 100px auto; padding: 0 16px; text-align: center; }
        h1 { margin-bottom: 8px; }
        p { color: #555; margin-bottom: 32px; }
        .btn { display: block; width: 100%; padding: 14px; font-size: 16px; margin-bottom: 12px;
               border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-decoration: none;
               color: #000; box-sizing: border-box; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: #0088cc; color: #fff; border-color: #0088cc; }
        .btn-primary:hover { background: #006fa8; }
    </style>
</head>
<body>
    <h1>Avito PF Bot</h1>
    <p>Выберите способ входа или создайте аккаунт</p>

    <a class="btn btn-primary" href="/login_telegram.html">Войти через Telegram</a>
    <a class="btn" href="/login.html">Войти через Email</a>
    <a class="btn" href="/register.html">Зарегистрироваться</a>

    <script>
        if (localStorage.getItem("access_token")) {
            window.location.href = "/cabinet.html";
        }
    </script>

</html>
