<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход через Email</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 16px; }
        h1 { margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input { display: block; width: 100%; padding: 10px; font-size: 16px; margin-bottom: 16px;
                border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; background: #0088cc; color: #fff;
                 border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #006fa8; }
        button:disabled { background: #aaa; cursor: default; }
        .err { color: #c00; margin-top: 12px; white-space: pre-wrap; }
        .back { display: block; margin-top: 16px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Вход через Email</h1>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" required>

    <label for="password">Пароль</label>
    <input id="password" type="password" placeholder="Ваш пароль" required>

    <button id="submit-btn">Войти</button>
    <div id="err" class="err"></div>

    <a class="back" href="/index.html">← Назад</a>

    <script>
        async function api(method, path, body) {
            const opts = { method, headers: { "Content-Type": "application/json" } };
            const token = localStorage.getItem("access_token");
            if (token) opts.headers["Authorization"] = `Bearer ${token}`;
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(path, opts);
            if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
            return r.status === 204 ? null : await r.json();
        }

        document.getElementById("submit-btn").onclick = async () => {
            const btn = document.getElementById("submit-btn");
            const errEl = document.getElementById("err");
            errEl.textContent = "";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                errEl.textContent = "Заполните email и пароль.";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Вхожу...";

            try {
                const data = await api("POST", "/api/auth/email/login", { email, password });
                localStorage.setItem("access_token", data.access_token);
                window.location.href = "/cabinet.html";
            } catch (e) {
                errEl.textContent = String(e);
                btn.disabled = false;
                btn.textContent = "Войти";
            }
        };
    </script>
</body>
</html>
