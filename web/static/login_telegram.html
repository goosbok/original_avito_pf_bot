<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход через Telegram</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 16px; }
        h1 { margin-bottom: 8px; }
        .hint { color: #555; margin-bottom: 24px; font-size: 14px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input { display: block; width: 100%; padding: 10px; font-size: 16px; margin-bottom: 16px;
                border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; background: #0088cc; color: #fff;
                 border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #006fa8; }
        button:disabled { background: #aaa; cursor: default; }
        .err  { color: #c00; margin-top: 12px; white-space: pre-wrap; }
        .ok   { color: #080; margin-top: 12px; }
        .back { display: block; margin-top: 16px; text-align: center; font-size: 14px; }
        #step2 { display: none; }
    </style>
</head>
<body>
    <h1>Вход через Telegram</h1>

    <!-- Step 1: request code -->
    <div id="step1">
        <p class="hint">Введите ваш Telegram username или числовой Telegram ID. Бот отправит вам одноразовый код.</p>
        <label for="identifier">Username или Telegram ID</label>
        <input id="identifier" type="text" placeholder="@username или 123456789">
        <button id="request-btn">Получить код</button>
        <div id="err1" class="err"></div>
    </div>

    <!-- Step 2: verify code -->
    <div id="step2">
        <p class="hint">Код отправлен. Введите его ниже.</p>
        <label for="code">Код из Telegram</label>
        <input id="code" type="text" placeholder="123456" maxlength="10">
        <button id="verify-btn">Войти</button>
        <div id="err2" class="err"></div>
    </div>

    <a class="back" href="/index.html">← Назад</a>

    <script>
        async function api(method, path, body) {
            const opts = { method, headers: { "Content-Type": "application/json" } };
            const token = localStorage.getItem("access_token");
            if (token) opts.headers["Authorization"] = `Bearer ${token}`;
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(path, opts);
            if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
            return r.status === 204 ? null : await r.json();
        }

        let savedIdentifier = "";

        document.getElementById("request-btn").onclick = async () => {
            const btn = document.getElementById("request-btn");
            const errEl = document.getElementById("err1");
            errEl.textContent = "";

            const identifier = document.getElementById("identifier").value.trim();
            if (!identifier) { errEl.textContent = "Введите username или числовой Telegram ID."; return; }

            btn.disabled = true;
            btn.textContent = "Отправляю...";

            try {
                await api("POST", "/api/auth/telegram/request-code", { identifier });
                savedIdentifier = identifier;
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
                document.getElementById("code").focus();
            } catch (e) {
                const msg = String(e);
                if (msg.includes("бот") || msg.includes("bot") || msg.includes("chat not found")) {
                    errEl.innerHTML = msg + '<br><a href="https://t.me/AVITOPF_bot" target="_blank">Открыть бот →</a>';
                } else {
                    errEl.textContent = msg;
                }
                btn.disabled = false;
                btn.textContent = "Получить код";
            }
        };

        document.getElementById("verify-btn").onclick = async () => {
            const btn = document.getElementById("verify-btn");
            const errEl = document.getElementById("err2");
            errEl.textContent = "";

            const code = document.getElementById("code").value.trim();
            if (!code) { errEl.textContent = "Введите код."; return; }

            btn.disabled = true;
            btn.textContent = "Проверяю...";

            try {
                const data = await api("POST", "/api/auth/telegram/verify-code", { identifier: savedIdentifier, code });
                localStorage.setItem("access_token", data.access_token);
                window.location.href = "/cabinet.html";
            } catch (e) {
                errEl.textContent = String(e);
                btn.disabled = false;
                btn.textContent = "Войти";
            }
        };
    </script>
</body>
</html>
